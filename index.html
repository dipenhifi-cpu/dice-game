<!DOCTYPE html>
<html>
<head>
    <title>Dice Game</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        img {
            width: 100px;
            margin: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>

<body style="background-image:url('https://images6.alphacoders.com/451/451028.jpg');background-repeat: no-repeat;background-size: 100%;">

<h1>🎲 Dice Game</h1>

<img id="dice1" src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Dice-1-b.svg">
<img id="dice2" src="https://upload.wikimedia.org/wikipedia/commons/1/1b/Dice-1-b.svg">

<br>

<button onclick="rollDice()">Roll Dice</button>

<p id="result"></p>
<script>
function rollDice() {

    let num1 = Math.floor(Math.random() * 6) + 1;
    let num2 = Math.floor(Math.random() * 6) + 1;

    document.getElementById("dice1").src = getImage(num1);
    document.getElementById("dice2").src = getImage(num2);

    if (num1 > num2) {
        document.getElementById("result").innerHTML = "Player 1(Saloni) Wins!";
    } else if (num2 > num1) {
        document.getElementById("result").innerHTML = "Player 2(Vivaan) Wins!";
    } else {
        document.getElementById("result").innerHTML = "It's a Draw!";
    }
}

function getImage(n) {
    const arr = [
        "https://upload.wikimedia.org/wikipedia/commons/1/1b/Dice-1-b.svg",
        "https://upload.wikimedia.org/wikipedia/commons/5/5f/Dice-2-b.svg",
        "https://upload.wikimedia.org/wikipedia/commons/b/b1/Dice-3-b.svg",
        "https://upload.wikimedia.org/wikipedia/commons/f/fd/Dice-4-b.svg",
        "https://upload.wikimedia.org/wikipedia/commons/0/08/Dice-5-b.svg",
        "https://upload.wikimedia.org/wikipedia/commons/2/26/Dice-6-b.svg"
    ];
    return arr[n - 1];
}
</script>

</body>
</html>
